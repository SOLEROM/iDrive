# Signing config — NEVER commit this file or signing.local.properties
# Copy to signing.local.properties and fill in real values

# Path to keystore file (relative to project root)
keystorePath=keystore/release.jks

# Key alias inside the keystore
keystoreAlias=idrive

# Passwords — prefer environment variables over storing here:
#   export KEYSTORE_STOREPASS=yourStorePassword
#   export KEYSTORE_KEYPASS=yourKeyPassword
# If using this file instead:
storePassword=CHANGE_ME
keyPassword=CHANGE_ME
